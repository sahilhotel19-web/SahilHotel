<!--
  This localStorage-backed shim gives window.storage the same
  get/set/list/delete interface the app expects, so the component
  code below did not need to change. Data is saved on THIS phone/
  browser only (per-device, not shared across devices).
-->
<script>
  window.storage = {
    async get(key) {
      const raw = localStorage.getItem(key);
      if (raw === null) throw new Error("not found");
      return { key, value: raw };
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value };
    },
    async delete(key) {
      const existed = localStorage.getItem(key) !== null;
      localStorage.removeItem(key);
      return { key, deleted: existed };
    },
    async list(prefix) {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys, prefix };
    },
  };
</script>

const CATS = [...new Set(MENU.map((m) => m.cat))];
const todayKey = () => new Date().toISOString().slice(0, 10);

const RESTAURANT_NAME = "Hotel Sahil";
const RESTAURANT_ADDRESS =
  "Bhoomi Colossa, Shop No. 22, Sector 19, Airoli, Navi Mumbai - 400708";
const RESTAURANT_PHONE = "9819718710";

const C = {
  cream: "#FFF7EC",
  card: "#FFFFFF",
  border: "#F0D6B4",
  maroon: "#8B2E1F",
  darkText: "#4A2318",
  mutedText: "#9C6B4F",
  amber: "#E8A33D",
  green: "#3F7A52",
  addGreen: "#16A34A",
  tabBg: "#F5E3C8",
  white: "#FFFFFF",
};

function App() {
  const [view, setView] = useState("bill");
  const [activeCat, setActiveCat] = useState(CATS[0]);
  const [bill, setBill] = useState({});
  const [customPrices, setCustomPrices] = useState({});
  const [orders, setOrders] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [customers, setCustomers] = useState({});
  const [loading, setLoading] = useState(true);
  const [payModal, setPayModal] = useState(false);
  const [lastOrder, setLastOrder] = useState(null);
  const [phone, setPhone] = useState("");
  const [error, setError] = useState("");
  const [search, setSearch] = useState("");
  const [expenseDesc, setExpenseDesc] = useState("");
  const [expenseAmt, setExpenseAmt] = useState("");
  const [toast, setToast] = useState("");

  useEffect(() => {
    (async () => {
      try {
        const [o, e, c] = await Promise.all([
          window.storage.get("hotel-sahil-orders").catch(() => null),
          window.storage.get("hotel-sahil-expenses").catch(() => null),
          window.storage.get("hotel-sahil-customers").catch(() => null),
        ]);
        if (o && o.value) setOrders(JSON.parse(o.value));
        if (e && e.value) setExpenses(JSON.parse(e.value));
        if (c && c.value) setCustomers(JSON.parse(c.value));
      } catch (e) {}
      setLoading(false);
    })();
  }, []);

  const flash = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 1800);
  };

  const saveOrders = async (next) => {
    setOrders(next);
    try {
      await window.storage.set("hotel-sahil-orders", JSON.stringify(next));
    } catch (e) {
      setError("Could not save order data — it may not persist.");
    }
  };

  const saveExpenses = async (next) => {
    setExpenses(next);
    try {
      await window.storage.set("hotel-sahil-expenses", JSON.stringify(next));
    } catch (e) {
      setError("Could not save expense data — it may not persist.");
    }
  };

  const saveCustomers = async (next) => {
    setCustomers(next);
    try {
      await window.storage.set("hotel-sahil-customers", JSON.stringify(next));
    } catch (e) {
      setError("Could not save customer data — it may not persist.");
    }
  };

  const add = (item) => {
    if (item.price === null && customPrices[item.id] == null) {
      const entered = window.prompt(`Enter today's price for ${item.name} (₹)`);
      const val = parseFloat(entered);
      if (!entered || isNaN(val) || val <= 0) return;
      setCustomPrices((p) => ({ ...p, [item.id]: val }));
    }
    setBill((b) => ({ ...b, [item.id]: (b[item.id] || 0) + 1 }));
  };
  const remove = (id) =>
    setBill((b) => {
      const n = { ...b };
      if (n[id] > 1) n[id] -= 1;
      else delete n[id];
      return n;
    });

  const removeAll = (id) =>
    setBill((b) => {
      const n = { ...b };
      delete n[id];
      return n;
    });

  const clearBill = () => {
    if (Object.keys(bill).length === 0) return;
    if (window.confirm("Clear the current bill?")) setBill({});
  };

  const items = useMemo(
    () =>
      Object.entries(bill)
        .map(([id, qty]) => {
          const m = MENU.find((x) => x.id === id);
          if (!m) return null;
          return { ...m, qty, price: customPrices[id] ?? m.price };
        })
        .filter(Boolean),
    [bill, customPrices]
  );
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);

  const finalizeOrder = async (method) => {
    const order = {
      id: Date.now(),
      date: todayKey(),
      time: new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }),
      items,
      total,
      count,
      method,
    };
    await saveOrders([...orders, order]);
    setLastOrder(order);
    setPayModal(false);
    setBill({});
  };

  const addExpense = async () => {
    const val = parseFloat(expenseAmt);
    if (!expenseDesc.trim() || isNaN(val) || val <= 0) {
      flash("Enter a description and a valid amount");
      return;
    }
    const exp = {
      id: Date.now(),
      date: todayKey(),
      time: new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }),
      desc: expenseDesc.trim(),
      amount: val,
    };
    await saveExpenses([...expenses, exp]);
    setExpenseDesc("");
    setExpenseAmt("");
    flash("Expense added");
  };

  const deleteExpense = async (id) => {
    await saveExpenses(expenses.filter((e) => e.id !== id));
  };

  const today = orders.filter((o) => o.date === todayKey());
  const todaySales = today.reduce((s, o) => s + o.total, 0);
  const todayItemsSold = today.reduce((s, o) => s + o.count, 0);
  const todayExpenses = expenses.filter((e) => e.date === todayKey());
  const todayExpenseTotal = todayExpenses.reduce((s, e) => s + e.amount, 0);
  const todayNet = todaySales - todayExpenseTotal;

  const billText = (order) => {
    const lines = order.items.map((i) => `${i.qty}x ${i.name} - ₹${i.price * i.qty}`).join("\n");
    return `🧾 ${RESTAURANT_NAME}\n${RESTAURANT_ADDRESS}\nOrders/Calls: ${RESTAURANT_PHONE}\n\nDate: ${order.date} ${order.time}\n\n${lines}\n\nTotal: ₹${order.total}\nPayment: ${order.method}\n\nThank you, visit again! 🙏`;
  };

  const saveCustomerRecord = async (phoneNum, order) => {
    const clean = phoneNum.replace(/\D/g, "");
    if (!clean) return;
    const next = { ...customers };
    const existing = next[clean] || { phone: clean, orderCount: 0, totalSpent: 0, firstSeen: order.date };
    next[clean] = {
      ...existing,
      phone: clean,
      orderCount: existing.orderCount + 1,
      totalSpent: existing.totalSpent + order.total,
      lastOrder: order.date,
    };
    await saveCustomers(next);
  };

  const sendWhatsApp = (order) => {
    const text = encodeURIComponent(billText(order));
    if (phone.trim()) {
      saveCustomerRecord(phone, order);
    }
    const url = phone.trim()
      ? `https://wa.me/${phone.replace(/\D/g, "")}?text=${text}`
      : `https://api.whatsapp.com/send?text=${text}`;
    window.open(url, "_blank");
  };

  const clearData = async () => {
    if (window.confirm("Clear all saved order & expense history? This can't be undone.")) {
      await saveOrders([]);
      await saveExpenses([]);
    }
  };

  const visibleItems = search.trim()
    ? MENU.filter((m) => m.name.toLowerCase().includes(search.toLowerCase()))
    : MENU.filter((m) => m.cat === activeCat);

  const customerList = Object.values(customers).sort((a, b) => b.totalSpent - a.totalSpent);

  if (loading) {
    return (
      <div style={{ background: C.cream, color: C.darkText }} className="min-h-screen flex items-center justify-center">
        <p className="text-sm" style={{ color: C.mutedText }}>Loading Hotel Sahil…</p>
      </div>
    );
  }

  return (
    <div style={{ background: C.cream, color: C.darkText }} className="h-screen flex flex-col font-sans relative overflow-hidden">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');
        .display { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .body-f { font-family: 'Inter', sans-serif; }
      `}</style>

      <header style={{ background: C.cream, borderBottom: `2px solid ${C.border}` }} className="shrink-0 px-5 py-3 shadow-sm z-10">
        <div className="max-w-md mx-auto">
          <div className="flex items-center justify-between gap-3">
            <div className="min-w-0">
              <h1 className="display text-xl font-black leading-tight truncate" style={{ color: C.maroon }}>{RESTAURANT_NAME}</h1>
              <p className="body-f text-[9px] leading-snug truncate" style={{ color: C.mutedText }}>{RESTAURANT_ADDRESS}</p>
            </div>
            <a
              href={`tel:${RESTAURANT_PHONE}`}
              style={{ background: C.green, color: C.white }}
              className="mono text-[11px] px-3 py-2 rounded-md font-semibold whitespace-nowrap shadow-sm active:scale-95 transition-transform shrink-0"
            >
              📞 CALL
            </a>
          </div>
          <div style={{ background: C.tabBg }} className="flex gap-1 rounded-md p-1 mt-2">
            <button
              onClick={() => setView("bill")}
              style={view === "bill" ? { background: C.amber, color: C.white } : { color: C.mutedText }}
              className="mono text-xs px-3 py-1.5 rounded-md flex-1 font-semibold transition-colors"
            >
              NEW BILL
            </button>
            <button
              onClick={() => setView("summary")}
              style={view === "summary" ? { background: C.amber, color: C.white } : { color: C.mutedText }}
              className="mono text-xs px-3 py-1.5 rounded-md flex-1 font-semibold transition-colors"
            >
              TODAY
            </button>
            <button
              onClick={() => setView("customers")}
              style={view === "customers" ? { background: C.amber, color: C.white } : { color: C.mutedText }}
              className="mono text-xs px-3 py-1.5 rounded-md flex-1 font-semibold transition-colors"
            >
              CUSTOMERS
            </button>
          </div>
        </div>
      </header>

      <div className="flex-1 overflow-y-auto min-h-0">
      {error && <div style={{ background: C.maroon, color: C.white }} className="text-xs px-5 py-2">{error}</div>}

      {view === "summary" && (
        <div className="max-w-md mx-auto px-5 py-6 space-y-5">
          <p className="mono text-xs uppercase tracking-widest" style={{ color: C.mutedText }}>{todayKey()}</p>

          <div className="grid grid-cols-2 gap-3">
            <Stat label="Sales" value={`₹${todaySales}`} color={C.green} />
            <Stat label="Expenses" value={`₹${todayExpenseTotal}`} color={C.maroon} />
            <Stat label="Net" value={`₹${todayNet}`} color={todayNet >= 0 ? C.green : C.maroon} />
            <Stat label="Items Sold" value={todayItemsSold} color={C.amber} />
          </div>

          <div style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-lg p-4">
            <p className="mono text-xs uppercase tracking-widest mb-3" style={{ color: C.mutedText }}>Add today's expense</p>
            <div className="flex gap-2 mb-2">
              <input
                value={expenseDesc}
                onChange={(e) => setExpenseDesc(e.target.value)}
                placeholder="e.g. Vegetables, Gas cylinder"
                style={{ background: C.cream, border: `1px solid ${C.border}` }}
                className="flex-1 rounded-md px-3 py-2 body-f text-sm"
              />
              <input
                value={expenseAmt}
                onChange={(e) => setExpenseAmt(e.target.value)}
                placeholder="₹"
                inputMode="decimal"
                style={{ background: C.cream, border: `1px solid ${C.border}` }}
                className="w-20 rounded-md px-3 py-2 body-f text-sm"
              />
            </div>
            <button
              onClick={addExpense}
              style={{ background: C.maroon, color: C.white }}
              className="w-full py-2 rounded-md mono text-xs font-semibold active:scale-[0.98] transition-transform"
            >
              ADD EXPENSE
            </button>
          </div>

          {todayExpenses.length > 0 && (
            <div>
              <p className="mono text-xs uppercase tracking-widest mb-2" style={{ color: C.mutedText }}>Today's expenses</p>
              <div className="space-y-2">
                {todayExpenses.slice().reverse().map((e) => (
                  <div key={e.id} style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-md p-3 flex items-center justify-between">
                    <div>
                      <p className="body-f text-sm">{e.desc}</p>
                      <p className="mono text-[10px]" style={{ color: C.mutedText }}>{e.time}</p>
                    </div>
                    <div className="flex items-center gap-3">
                      <p className="mono text-sm font-semibold" style={{ color: C.maroon }}>₹{e.amount}</p>
                      <button onClick={() => deleteExpense(e.id)} className="text-xs" style={{ color: C.mutedText }}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ borderTop: `1px solid ${C.border}` }} className="pt-4">
            <p className="mono text-xs uppercase tracking-widest mb-3" style={{ color: C.mutedText }}>Orders today</p>
            {today.length === 0 && <p className="body-f text-sm" style={{ color: C.mutedText }}>No orders yet today.</p>}
            <div className="space-y-2">
              {today.slice().reverse().map((o) => (
                <div key={o.id} style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-md p-3 flex items-center justify-between">
                  <div>
                    <p className="body-f text-sm">{o.time} · {o.count} items</p>
                    <p className="mono text-xs" style={{ color: C.mutedText }}>{o.method}</p>
                  </div>
                  <p className="mono text-sm font-semibold" style={{ color: C.amber }}>₹{o.total}</p>
                </div>
              ))}
            </div>
          </div>
          {(orders.length > 0 || expenses.length > 0) && (
            <button onClick={clearData} className="mono text-xs underline pt-2" style={{ color: C.mutedText }}>
              Clear all data
            </button>
          )}
        </div>
      )}

      {view === "customers" && (
        <div className="max-w-md mx-auto px-5 py-6 space-y-3">
          <p className="mono text-xs uppercase tracking-widest" style={{ color: C.mutedText }}>
            Saved customers ({customerList.length})
          </p>
          {customerList.length === 0 && (
            <p className="body-f text-sm py-4" style={{ color: C.mutedText }}>
              No customer numbers saved yet. When you send a bill via WhatsApp with a number entered, it's saved here automatically.
            </p>
          )}
          <div className="space-y-2">
            {customerList.map((c) => (
              <div key={c.phone} style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-md p-3 flex items-center justify-between">
                <div>
                  <p className="body-f text-sm font-semibold">{c.phone}</p>
                  <p className="mono text-[10px]" style={{ color: C.mutedText }}>
                    {c.orderCount} order{c.orderCount > 1 ? "s" : ""} · last {c.lastOrder}
                  </p>
                </div>
                <div className="flex items-center gap-2">
                  <p className="mono text-sm font-semibold" style={{ color: C.green }}>₹{c.totalSpent}</p>
                  <a
                    href={`https://wa.me/${c.phone}`}
                    target="_blank"
                    rel="noreferrer"
                    style={{ background: C.green, color: C.white }}
                    className="text-xs mono px-2 py-1 rounded"
                  >
                    Chat
                  </a>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {view === "bill" && (
        <div className="max-w-md mx-auto">
          <div className="px-5 pt-4">
            <input
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="🔍 Search dish..."
              style={{ background: C.card, border: `1px solid ${C.border}` }}
              className="w-full rounded-md px-3 py-2.5 body-f text-sm mb-3 shadow-sm"
            />
          </div>
          {!search.trim() && (
            <div className="flex gap-2 px-5 pb-2 overflow-x-auto">
              {CATS.map((c) => (
                <button
                  key={c}
                  onClick={() => setActiveCat(c)}
                  style={
                    activeCat === c
                      ? { background: C.maroon, color: C.white, border: `1px solid ${C.maroon}` }
                      : { background: C.card, color: C.mutedText, border: `1px solid ${C.border}` }
                  }
                  className="mono text-xs px-3 py-1.5 rounded-md whitespace-nowrap transition-colors"
                >
                  {c.toUpperCase()}
                </button>
              ))}
            </div>
          )}

          <div className="px-5 py-2 space-y-2">
            {visibleItems.map((m) => (
              <div key={m.id} style={{ background: C.card, border: `1px solid ${C.border}` }} className="flex items-center justify-between gap-3 rounded-md px-3 py-2.5">
                <div className="min-w-0 flex-1">
                  <p className="body-f font-semibold text-sm truncate">{m.name}</p>
                  <p className="mono text-xs font-semibold" style={{ color: C.amber }}>
                    {m.price === null
                      ? customPrices[m.id] != null
                        ? `₹${customPrices[m.id]}`
                        : "APS — tap Add"
                      : `₹${m.price}`}
                  </p>
                </div>
                <div className="shrink-0">
                  <QtyControl qty={bill[m.id] || 0} onAdd={() => add(m)} onRemove={() => remove(m.id)} onRemoveAll={() => removeAll(m.id)} />
                </div>
              </div>
            ))}
            {visibleItems.length === 0 && (
              <p className="body-f text-sm py-4" style={{ color: C.mutedText }}>No dish matches "{search}".</p>
            )}
          </div>

          {count > 0 && (
            <div className="sticky bottom-0 pb-4 pt-2 px-4 z-20" style={{ background: `linear-gradient(to top, ${C.cream}, ${C.cream} 60%, transparent)` }}>
              <div style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-lg shadow-2xl">
                <div style={{ borderBottom: `1px dashed ${C.border}` }} className="px-4 pt-3 pb-2 flex items-center justify-between">
                  <span className="mono text-xs uppercase tracking-wider" style={{ color: C.mutedText }}>Current bill</span>
                  <div className="flex items-center gap-3">
                    <span className="mono text-xs" style={{ color: C.mutedText }}>{count} items</span>
                    <button onClick={clearBill} className="mono text-[10px] underline" style={{ color: C.maroon }}>clear all</button>
                  </div>
                </div>
                <div className="px-4 py-2 max-h-28 overflow-y-auto">
                  {items.map((i) => (
                    <div key={i.id} className="mono text-xs py-1 flex items-center justify-between gap-2">
                      <span className="truncate">{i.qty}× {i.name}</span>
                      <span className="flex items-center gap-2 shrink-0">
                        ₹{i.price * i.qty}
                        <button
                          onClick={() => removeAll(i.id)}
                          aria-label={`Remove ${i.name}`}
                          style={{ background: C.tabBg, color: C.maroon }}
                          className="w-5 h-5 flex items-center justify-center rounded font-bold"
                        >
                          ✕
                        </button>
                      </span>
                    </div>
                  ))}
                </div>
                <button
                  onClick={() => setPayModal(true)}
                  style={{ background: C.amber, color: C.white }}
                  className="w-full display font-bold text-sm py-4 rounded-b-lg active:scale-[0.99] transition-transform"
                >
                  COMPLETE ORDER · ₹{total}
                </button>
              </div>
            </div>
          )}
        </div>
      )}
      </div>

      {payModal && (
        <div className="absolute inset-0 flex items-end justify-center z-30" style={{ background: "rgba(0,0,0,0.5)" }}>
          <div style={{ background: C.card, color: C.darkText }} className="max-w-md w-full rounded-t-lg p-5">
            <p className="mono text-xs uppercase tracking-widest mb-4" style={{ color: C.mutedText }}>Select payment method</p>
            <p className="mono text-2xl mb-4 font-bold">₹{total}</p>
            <div className="grid grid-cols-2 gap-3 mb-4">
              <button onClick={() => finalizeOrder("Cash")} style={{ border: `2px solid ${C.maroon}`, color: C.maroon }} className="py-3 rounded-md mono text-sm font-semibold active:scale-95 transition-transform">
                CASH
              </button>
              <button onClick={() => finalizeOrder("Online")} style={{ background: C.green, color: C.white }} className="py-3 rounded-md mono text-sm font-semibold active:scale-95 transition-transform">
                ONLINE
              </button>
            </div>
            <button onClick={() => setPayModal(false)} className="mono text-xs underline" style={{ color: C.mutedText }}>
              Cancel
            </button>
          </div>
        </div>
      )}

      {lastOrder && (
        <div className="absolute inset-0 flex items-center justify-center z-30 px-5" style={{ background: "rgba(0,0,0,0.5)" }}>
          <div style={{ background: C.card, color: C.darkText }} className="max-w-md w-full rounded-lg p-5 max-h-[90vh] overflow-y-auto">
            <p className="mono text-xs uppercase tracking-widest mb-2" style={{ color: C.mutedText }}>Order complete — {lastOrder.method}</p>
            <pre className="body-f text-xs whitespace-pre-wrap p-3 rounded-md mb-4" style={{ background: C.cream, border: `1px solid ${C.border}` }}>{billText(lastOrder)}</pre>
            <label className="body-f text-xs block mb-1" style={{ color: C.mutedText }}>Customer WhatsApp number (optional — saves for future contact)</label>
            <input
              value={phone}
              onChange={(e) => setPhone(e.target.value)}
              placeholder="e.g. 919876543210"
              style={{ border: `1px solid ${C.border}`, background: C.white }}
              className="w-full rounded-md px-3 py-2 mono text-sm mb-3"
            />
            <button onClick={() => sendWhatsApp(lastOrder)} style={{ background: C.green, color: C.white }} className="w-full py-3 rounded-md mono text-sm font-semibold mb-2 active:scale-[0.98] transition-transform">
              SEND VIA WHATSAPP
            </button>
            <button onClick={() => { setLastOrder(null); setPhone(""); }} className="w-full py-2 mono text-xs underline" style={{ color: C.mutedText }}>
              Done
            </button>
          </div>
        </div>
      )}

      {toast && (
        <div style={{ background: C.darkText, color: C.white }} className="absolute top-4 left-1/2 -translate-x-1/2 text-xs px-4 py-2 rounded-md shadow-lg z-40">
          {toast}
        </div>
      )}
    </div>
  );
}

function Stat({ label, value, color }) {
  return (
    <div style={{ background: "#FFFFFF", border: "1px solid #F0D6B4" }} className="rounded-lg p-3">
      <p className="mono text-lg font-bold" style={{ color: color || "#E8A33D" }}>{value}</p>
      <p className="body-f text-[10px] uppercase tracking-wide mt-1" style={{ color: "#9C6B4F" }}>{label}</p>
    </div>
  );
}

function QtyControl({ qty, onAdd, onRemove, onRemoveAll }) {
  if (qty === 0) {
    return (
      <button
        onClick={onAdd}
        style={{ background: "#16A34A", color: "#FFFFFF" }}
        className="mono text-xs px-4 py-2.5 rounded-md font-bold shadow-md active:scale-95 transition-transform whitespace-nowrap shrink-0"
      >
        ADD
      </button>
    );
  }
  return (
    <div className="flex items-center gap-1.5">
      <button
        onClick={onRemoveAll}
        aria-label="Remove item"
        title="Remove item"
        style={{ background: "#F5E3C8", color: "#8B2E1F" }}
        className="mono w-7 h-7 flex items-center justify-center rounded-md"
      >
        🗑
      </button>
      <button onClick={onRemove} style={{ border: "2px solid #16A34A", color: "#16A34A" }} className="mono w-7 h-7 flex items-center justify-center rounded-md font-bold">−</button>
      <span className="mono text-sm w-5 text-center font-bold">{qty}</span>
      <button onClick={onAdd} style={{ background: "#16A34A", color: "#FFFFFF" }} className="mono w-7 h-7 flex items-center justify-center rounded-md font-bold shadow-sm">+</button>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
